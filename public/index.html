<!DOCTYPE html>
<html>
<head>
    <title>FlowCare - Clinic Queue System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #f8fafc);
            font-family: 'Segoe UI', sans-serif;
        }

        .main-card {
            max-width: 420px;
            margin: auto;
            margin-top: 80px;
            border-radius: 20px;
            padding: 40px;
            background: white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);

            /* ✨ glide up animation */
            animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .logo {
            width: 300px;        /* increase size */
            height: 60px;        /* control height */
            object-fit: cover; /* keeps logo ratio */
            display: block;
            margin: 0 auto 10px;
        }

        .qr-img {
            width: 200px; 
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        .btn {
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        


        /* animation */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="main-card text-center">

    src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=http://10.70.236.134:8080/authentication/register.php"

    <p class="text-muted small mb-4">
        Use your phone camera to scan the QR code
    </p>

    <!-- BUTTONS -->
    <div class="d-flex justify-content-center gap-3">
        <a href="../authentication/register.php" class="btn btn-primary px-4">
            Register
        </a>

<!DOCTYPE html>
<html>
<head>
    <title>FlowCare - Clinic Queue System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">


    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #f8fafc);
            font-family: 'Segoe UI', sans-serif;
        }

        .main-card {
            max-width: 420px;
            margin: auto;
            margin-top: 80px;
            border-radius: 20px;
            padding: 40px;
            background: white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);

            /* glide up animation */
            animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .logo {
            width: 300px;        /* increase size */
            height: 60px;        /* control height */
            object-fit: cover; /* keeps logo ratio */
            display: block;
            margin: 0 auto 10px;
        }

        .qr-img {
            width: 200px; 
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        .btn {
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .queue-preview {
            position: fixed;   /* makes it float */
            top: 80px;
            right: 20px;
            width: 220px;
            border-radius: 15px;
            z-index: 999;
        }

        body {
            background: linear-gradient(135deg, #9ecae1, #f8fbff);
        }
        
        /* animation */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="queue-preview card p-3 shadow-sm text-center"> <!--queue-->

    <div class="d-flex justify-content-center align-items-center gap-2 mb-1">
        <small class="text-muted">Now Serving</small>
        <span class="badge bg-success">LIVE</span>
    </div>

    <div id="serving" class="fw-bold text-danger" style="font-size: 28px;">
        A783
    </div>

    <div class="d-flex justify-content-between mt-2">

        <div>
            <small class="text-muted">Prev</small>
            <div id="prevQueue">A782</div>
        </div>

        <div>
            <small class="text-muted">Next</small>
            <div id="nextQueue">A784</div>
        </div>

    </div>

</div>



<div class="main-card text-center">

    <!-- LOGO  -->
    <img src="../assets/img/Fl.png" class="logo mb-3">

    <p class="text-muted mb-4">Self-Queue Clinic System</p>

    <h5 class="mb-3">Scan to Register</h5>

    <!-- QR -->
    <img 
    src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=http://10.70.236.134:8080/authentication/register.php" 
    class="qr-img mb-3">

    <p class="text-muted small mb-4">
        Use your phone camera to scan the QR code
    </p>

    <!-- BUTTONS -->
    <div class="d-flex justify-content-center gap-3">
        <a href="../authentication/register.php" class="btn btn-primary px-4">
            Register
        </a>

        <a href="../queue/queue.php" class="btn btn-success px-4">
            View Queue
        </a>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

    function loadQueue(){
        fetch("../queue/get_queue.php")
        .then(res => res.json())
        .then(data => {
            document.getElementById("serving").innerText = data.serving;
            document.getElementById("prevQueue").innerText = data.previous;
            document.getElementById("nextQueue").innerText = data.next;
        })
        .catch(err => console.log("Queue error:", err));
    }

    loadQueue();
    setInterval(loadQueue, 3000);

});
</script>

</body>
</html>
